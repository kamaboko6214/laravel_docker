version: '3'

services:
  web:
    build: ./web
    container_name: web-container
    networks:
      - laravel-net
    ports:
      - 8000:80
    volumes:
      - ./web/laravel:/var/www/html
    depends_on:
      - db
    restart: always

  db:
    image: mysql:5.7
    container_name: db-container
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=laravel_db
      - MYSQL_USER=laravel_user
      - MYSQL_PASSWORD=laravel_pass
      - TZ='Asia/Tokyo'
    networks:
      - laravel-net
    volumes:
      - ./db/mysql/data:/var/lib/mysql
      - ./db/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    # Windows궳걏Docker ToolBox걐귩뿕뾭궢궲궋귡뤾뜃궼뤵궻덇뛱궻묆귦귟궸댥돷귩럊뾭
    # command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-use-native-aio=0
    restart: always

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin-container
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOSTS=db
      - PMA_USER=root
      - PMA_PASSWORD=root_pass
    networks:
      - laravel-net
    ports:
      - 8888:80
    depends_on:
      - db
    restart: always

networks:
  laravel-net: